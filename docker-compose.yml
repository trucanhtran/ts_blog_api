services:
  db:
    # use the newest postgres major release; replace with a specific tag if you
    # need reproducible builds. "latest" is discouraged in production but
    # acceptable for a development/test setup.
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: >
      bash -lc "bundle check || bundle install --jobs 4 --retry 3 && bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/rails:cached
      - bundle_data:/usr/local/bundle
      - ./config/master.key:/rails/config/master.key:ro
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      DATABASE_NAME: app_development
      REDIS_URL: redis://redis:6379/1
      BUNDLE_PATH: /usr/local/bundle
      BUNDLE_WITHOUT: "production"

volumes:
  postgres_data:
  bundle_data:
