# PostgreSQL config for development, test, and production.
# Uses environment variables when available; sensible defaults provided.

development:
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  database: <%= ENV.fetch("DATABASE_NAME") { "app_development" } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { nil } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>

test:
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  database: <%= ENV.fetch("DATABASE_NAME") { "app_test" } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { nil } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>

production:
  primary:
    adapter: postgresql
    encoding: unicode
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: <%= ENV.fetch("APP_DATABASE_NAME") { "app_production" } %>
    username: <%= ENV.fetch("APP_DATABASE_USER") { "app" } %>
    password: <%= ENV["APP_DATABASE_PASSWORD"] %>

  cache:
    adapter: postgresql
    encoding: unicode
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: app_production_cache
    migrations_paths: db/cache_migrate

  queue:
    adapter: postgresql
    encoding: unicode
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: app_production_queue
    migrations_paths: db/queue_migrate

  cable:
    adapter: postgresql
    encoding: unicode
    max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: app_production_cable
    migrations_paths: db/cable_migrate
