openapi: 3.0.1
info:
  title: Blog API
  version: v1

paths:
  /api/v1/posts:
    get:
      summary: List posts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: 1
        - name: per_page
          in: query
          schema:
            type: integer
          example: 20
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Post"
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total:
                        type: integer

    post:
      summary: Create post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /api/v1/posts/{id}:
    get:
      summary: Show post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    patch:
      summary: Update post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

    delete:
      summary: Delete post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: deleted

  /api/v1/comments:
    get:
      summary: Get list of comments
      tags:
        - Comments
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
          description: Number of comments per page
      responses:
        "200":
          description: List comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer

    post:
      summary: Create a comment
      tags:
        - Comments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
                - post_id
                - user_id
              properties:
                content:
                  type: string
                post_id:
                  type: integer
                user_id:
                  type: integer
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "422":
          description: Validation error

  /api/v1/comments/{id}:
    get:
      summary: Get comment by ID
      tags:
        - Comments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Comment not found

    patch:
      summary: Update a comment
      tags:
        - Comments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                post_id:
                  type: integer
                user_id:
                  type: integer
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "422":
          description: Validation error

    put:
      summary: Update a comment (full update)
      tags:
        - Comments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "200":
          description: Comment updated

    delete:
      summary: Delete a comment
      tags:
        - Comments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Comment deleted

  /api/v1/signup:
    post:
      summary: User signup
      tags:
        - Authentication

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  required:
                    - email
                    - name
                    - password
                    - password_confirmation
                  properties:
                    email:
                      type: string
                      example: test@example.com
                    name:
                      type: string
                      example: John Doe
                    password:
                      type: string
                      example: 123456
                    password_confirmation:
                      type: string
                      example: 123456

      responses:
        "201":
          description: Signed up successfully
        "422":
          description: Validation error

components:
  schemas:
    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
        summary:
          type: string
        word_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PostInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        published:
          type: boolean
      required:
        - title
        - content
